# Supabase local development config
# Run `supabase start` to spin up a local Supabase stack for development
# https://supabase.com/docs/guides/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# Production: update site_url to your deployed domain (e.g. https://pdpl.yourcompany.com)
# Run: supabase --project-ref <ref> update-config auth.site_url https://pdpl.yourcompany.com
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 8
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
template.invite.subject = "You have been invited to PDPL Reviewer"
template.confirmation.subject = "Confirm your PDPL Reviewer email"
template.recovery.subject = "Reset your PDPL Reviewer password"

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.ai-stream]
verify_jwt = true

[functions.external-link]
verify_jwt = false

[functions.process-attachment]
verify_jwt = true

[functions.email-notify]
# Called by a Supabase Database Webhook (service-role JWT or custom WEBHOOK_SECRET)
verify_jwt = false

[analytics]
enabled = false
port = 54327
